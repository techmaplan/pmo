<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJEKTY — PANEL GŁÓWNY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#fff;--g1:#f2f2f0;--g2:#e0dfdc;--g3:#c8c7c3;--g4:#9e9d99;--g6:#5a5955;--g8:#2a2a28}
body{font-family:'Barlow',sans-serif;background:var(--g1);color:var(--black);min-height:100vh;display:flex;flex-direction:column}

.site-header{background:var(--black);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:72px;border-bottom:2px solid #222;flex-shrink:0}
.header-left{display:flex;flex-direction:column;gap:2px}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--white);letter-spacing:.04em;text-transform:uppercase}
.header-sub{font-size:11px;color:var(--g4);letter-spacing:.1em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:10px}

.toolbar{padding:16px 32px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar button{font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;padding:4px 14px;cursor:pointer;border:1px solid #d0ccc8;background:#fff;color:#333;box-shadow:0 1px 3px rgba(0,0,0,.10);border-radius:4px;transition:background .12s,box-shadow .12s;letter-spacing:.04em;text-transform:uppercase;height:29px;display:inline-flex;align-items:center;gap:5px}
.toolbar button:hover{background:#f5f3f0;box-shadow:0 2px 6px rgba(0,0,0,.13)}
.toolbar .btn-add{background:var(--black);color:#fff;border-color:var(--black)}
.toolbar .btn-add:hover{background:var(--g8)}
.toolbar button:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.col-sep{width:1px;height:20px;background:var(--g3)}

.filter-bar{padding:10px 32px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:700;color:var(--g4);letter-spacing:.1em;text-transform:uppercase;margin-right:2px}
.filter-btn{font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;padding:2px 10px;cursor:pointer;border:1px solid var(--g3);background:transparent;color:var(--g6);border-radius:3px;transition:all .12s;letter-spacing:.04em;text-transform:uppercase;height:22px}
.filter-btn:hover,.filter-btn.active{background:var(--black);color:#fff;border-color:var(--black)}

.page{padding:16px 32px 32px;flex:1}

.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:#fff;border:1px solid var(--g2);padding:10px 18px;min-width:120px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--black);line-height:1}
.stat-label{font-size:9px;font-weight:700;color:var(--g4);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}

.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}

.project-card{background:#fff;border:1px solid var(--g2);transition:box-shadow .15s,border-color .15s;position:relative;display:flex;flex-direction:column}
.project-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.10);border-color:var(--g3)}
.project-card.active .card-accent{background:#27ae60}
.project-card.paused .card-accent{background:#e67e22}
.project-card.done .card-accent{background:var(--g4)}
.project-card.planned .card-accent{background:#2980b9}
.card-accent{width:100%;height:3px;flex-shrink:0}
.card-body{padding:10px 12px;flex:1;display:flex;flex-direction:column}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:4px}
.card-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--g4);letter-spacing:.1em;text-transform:uppercase}
.card-status{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:1px 6px;border-radius:2px}
.status-active{background:#e8f8ee;color:#1a7a40}
.status-paused{background:#fef3e8;color:#b85c00}
.status-done{background:var(--g1);color:var(--g6)}
.status-planned{background:#eef4fb;color:#1a5080}
.card-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--black);line-height:1.2;text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px}
.card-desc{font-size:11px;color:var(--g6);line-height:1.4;margin-bottom:6px;flex:1}
.card-meta{display:flex;align-items:center;gap:8px;border-top:1px solid var(--g1);padding-top:6px}
.meta-item{display:flex;flex-direction:column;gap:1px}
.meta-val{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--g8)}
.meta-key{font-size:8px;font-weight:700;color:var(--g4);letter-spacing:.08em;text-transform:uppercase}
.meta-sep{width:1px;height:22px;background:var(--g2)}
.card-progress{margin-top:6px}
.progress-label{display:flex;justify-content:space-between;margin-bottom:3px}
.progress-text{font-size:8px;font-weight:700;color:var(--g4);letter-spacing:.08em;text-transform:uppercase}
.progress-pct{font-size:8px;font-weight:700;color:var(--g8)}
.progress-track{height:2px;background:var(--g2)}
.progress-fill{height:100%;background:var(--black);transition:width .3s ease}
.project-card.active .progress-fill{background:#27ae60}
.project-card.paused .progress-fill{background:#e67e22}
.card-actions{padding:6px 12px;border-top:1px solid var(--g1);display:flex;gap:5px;background:var(--g1)}
.action-btn{font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;padding:2px 8px;cursor:pointer;border:1px solid #d0ccc8;background:#fff;color:#444;border-radius:3px;transition:all .12s;letter-spacing:.04em;text-transform:uppercase;height:22px;display:inline-flex;align-items:center;gap:4px}
.action-btn:hover{background:#f5f3f0;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.action-btn.primary{background:var(--black);color:#fff;border-color:var(--black)}
.action-btn.primary:hover{background:var(--g8)}

.project-card[draggable]{cursor:grab}
.project-card[draggable]:active{cursor:grabbing}
.project-card.drag-over{outline:2px dashed var(--g4);outline-offset:-2px;opacity:.6}
.project-card.dragging{opacity:.35}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border:2px solid var(--black);padding:28px;width:420px;max-width:95vw;box-shadow:6px 6px 0 var(--black)}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{font-size:10px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;font-size:13px;font-family:'Barlow',sans-serif;border:1.5px solid var(--g3);background:#fff;color:var(--black);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--black)}
.field textarea{min-height:60px;resize:vertical;line-height:1.5}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--g2)}
.modal-actions button{font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:6px 18px;cursor:pointer;border:1.5px solid var(--black);letter-spacing:.04em;text-transform:uppercase;height:32px;display:inline-flex;align-items:center}
.modal-actions .btn-save{background:var(--black);color:#fff}
.modal-actions .btn-save:hover{background:var(--g8)}
.modal-actions .btn-cancel{background:#fff;color:var(--black)}
.modal-actions .btn-cancel:hover{background:var(--g1)}
.btn-del{margin-right:auto;background:#fff;color:#c0392b;border-color:#c0392b}
.btn-del:hover{background:#c0392b;color:#fff}

.empty-state{padding:64px 32px;text-align:center;grid-column:1/-1}
.empty-state .es-icon{font-size:40px;margin-bottom:16px}
.empty-state .es-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--g3);margin-bottom:8px}
.empty-state .es-sub{font-size:12px;color:var(--g4)}

.search-wrap{position:relative;flex:1;max-width:280px}
.search-wrap input{width:100%;padding:5px 10px 5px 30px;font-size:12px;font-family:'Barlow',sans-serif;border:1px solid var(--g3);background:#fff;color:var(--black);outline:none;height:29px}
.search-wrap input:focus{border-color:var(--black)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--g4);font-size:12px;pointer-events:none}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <div class="header-title">Panel projektów</div>
    <div class="header-sub">Zarządzanie harmonogramami</div>
  </div>
  <div class="header-right">
    <div id="user-info" style="display:none;align-items:center;gap:10px">
      <span id="user-email" style="font-size:11px;color:var(--g4);letter-spacing:.06em"></span>
      <div id="presence-bar" style="display:flex;align-items:center;gap:4px"></div>
      <button onclick="openChangePassword()" style="font-family:'Barlow',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 12px;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--g4);border-radius:3px;height:24px">Zmień hasło</button>
      <button onclick="sbSignOut()" style="font-family:'Barlow',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 12px;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--g4);border-radius:3px;height:24px">Wyloguj</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Szukaj projektu…" id="search-input" oninput="filterProjects()">
    </div>
  </div>
</header>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="position:fixed;inset:0;background:var(--g1);z-index:1000;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border:2px solid var(--black);padding:40px;width:360px;max-width:95vw;box-shadow:6px 6px 0 var(--black)">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Panel projektów</div>
    <div style="font-size:11px;color:var(--g4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px">Zaloguj się aby kontynuować</div>
    <div style="margin-bottom:14px">
      <label style="font-size:10px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px">Email</label>
      <input id="login-email" type="email" placeholder="twoj@email.com" style="width:100%;padding:8px 10px;font-size:13px;font-family:'Barlow',sans-serif;border:1.5px solid var(--g3);outline:none;background:#fff" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="margin-bottom:8px">
      <label style="font-size:10px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px">Hasło</label>
      <input id="login-password" type="password" placeholder="••••••••" style="width:100%;padding:8px 10px;font-size:13px;font-family:'Barlow',sans-serif;border:1.5px solid var(--g3);outline:none;background:#fff" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="margin-bottom:20px;text-align:right">
      <button onclick="openForgotPassword()" style="font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;color:var(--g4);background:none;border:none;cursor:pointer;letter-spacing:.04em;padding:0;text-decoration:underline">Zapomniałem hasła</button>
    </div>
    <div id="login-error" style="font-size:11px;color:#c0392b;margin-bottom:12px;display:none"></div>
    <button id="login-btn" onclick="doLogin()" style="width:100%;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:10px;cursor:pointer;border:1.5px solid var(--black);background:var(--black);color:#fff;height:40px">Zaloguj</button>
  </div>
</div>

<!-- RESET HASŁA MODAL -->
<div id="forgot-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1100;display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border:2px solid var(--black);padding:32px;width:360px;max-width:95vw;box-shadow:6px 6px 0 var(--black)" onclick="event.stopPropagation()">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:20px">Reset hasła</div>
    <div style="font-size:12px;color:var(--g6);margin-bottom:16px">Wpisz swój email — wyślemy link do zresetowania hasła.</div>
    <div style="margin-bottom:16px">
      <label style="font-size:10px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px">Email</label>
      <input id="forgot-email" type="email" placeholder="twoj@email.com" style="width:100%;padding:8px 10px;font-size:13px;font-family:'Barlow',sans-serif;border:1.5px solid var(--g3);outline:none;background:#fff" onkeydown="if(event.key==='Enter')doForgotPassword()">
    </div>
    <div id="forgot-msg" style="font-size:11px;margin-bottom:12px;display:none"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeForgotPassword()" style="font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:6px 18px;cursor:pointer;border:1.5px solid var(--black);background:#fff;color:var(--black);letter-spacing:.04em;text-transform:uppercase;height:32px">Anuluj</button>
      <button id="forgot-btn" onclick="doForgotPassword()" style="font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:6px 18px;cursor:pointer;border:1.5px solid var(--black);background:var(--black);color:#fff;letter-spacing:.04em;text-transform:uppercase;height:32px">Wyślij link</button>
    </div>
  </div>
</div>

<!-- ZMIANA HASŁA MODAL -->
<div id="change-pwd-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1100;display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border:2px solid var(--black);padding:32px;width:360px;max-width:95vw;box-shadow:6px 6px 0 var(--black)" onclick="event.stopPropagation()">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:20px">Zmień hasło</div>
    <div style="margin-bottom:14px">
      <label style="font-size:10px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px">Nowe hasło</label>
      <input id="new-password" type="password" placeholder="••••••••" style="width:100%;padding:8px 10px;font-size:13px;font-family:'Barlow',sans-serif;border:1.5px solid var(--g3);outline:none;background:#fff">
    </div>
    <div style="margin-bottom:20px">
      <label style="font-size:10px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px">Powtórz hasło</label>
      <input id="new-password2" type="password" placeholder="••••••••" style="width:100%;padding:8px 10px;font-size:13px;font-family:'Barlow',sans-serif;border:1.5px solid var(--g3);outline:none;background:#fff">
    </div>
    <div id="change-pwd-msg" style="font-size:11px;margin-bottom:12px;display:none"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeChangePassword()" style="font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:6px 18px;cursor:pointer;border:1.5px solid var(--black);background:#fff;color:var(--black);letter-spacing:.04em;text-transform:uppercase;height:32px">Anuluj</button>
      <button id="change-pwd-btn" onclick="doChangePassword()" style="font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:6px 18px;cursor:pointer;border:1.5px solid var(--black);background:var(--black);color:#fff;letter-spacing:.04em;text-transform:uppercase;height:32px">Zapisz</button>
    </div>
  </div>
</div>

<div class="toolbar">
  <button class="btn-add" id="btn-new">＋ Nowy projekt</button>
  <div class="col-sep"></div>
  <button onclick="openZasoby()">👥 Zasoby</button>
  <div class="col-sep"></div>
  <button id="view-grid" onclick="setView('grid')">⊞ Kafelki</button>
  <button id="view-list" onclick="setView('list')">☰ Lista</button>
</div>

<div class="filter-bar">
  <span class="filter-label">Status:</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">Wszystkie</button>
  <button class="filter-btn" onclick="setFilter('active',this)">Aktywne</button>
  <button class="filter-btn" onclick="setFilter('done',this)">Zakończone</button>
</div>

<div class="page">
  <div class="stats-row" id="stats-row"></div>
  <div class="projects-grid" id="projects-container"></div>
</div>

<!-- EDIT MODAL (tylko do edycji metadanych) -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">Edytuj projekt</h3>
    <div class="field-row">
      <div class="field">
        <label>Numer projektu</label>
        <input type="text" id="f-num" placeholder="0000000-000-000" maxlength="15" oninput="formatProjNum(this)">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f-status">
          <option value="planned">Planowany</option>
          <option value="active">Aktywny</option>
          <option value="paused">Wstrzymany</option>
          <option value="done">Zakończony</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Nazwa projektu</label>
      <input type="text" id="f-name" placeholder="Nazwa projektu">
    </div>
    <div class="field">
      <label>Opis</label>
      <textarea id="f-desc" placeholder="Krótki opis…"></textarea>
    </div>
    <div class="field-row">
      <div class="field"><label>Start</label><input type="date" id="f-start"></div>
      <div class="field"><label>Koniec</label><input type="date" id="f-end"></div>
    </div>
    <div class="field">
      <label>Postęp (%)</label>
      <input type="number" id="f-progress" min="0" max="100" value="0">
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="btn-delete" onclick="deleteProject()">🗑 Usuń</button>
      <button class="btn-cancel" onclick="closeModal()">Anuluj</button>
      <button class="btn-save" onclick="saveProject()">Zapisz</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://qggsljbngjtlkzahapch.supabase.co';
const SB_KEY = 'sb_publishable_WDcdhn0NY9IRrNFSlmldkA_kSI62e5p';

// ── Auth ─────────────────────────────────────────────────────────────────────
let _authToken = null;
let _authUser  = null;

async function sbSignIn(email, password) {
  const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Błąd logowania');
  _authToken = data.access_token;
  _authUser  = data.user;
  sessionStorage.setItem('sb_token', _authToken);
  sessionStorage.setItem('sb_user',  JSON.stringify(_authUser));
  return data;
}

async function sbSignOut() {
  try {
    await fetch(`${SB_URL}/auth/v1/logout`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${_authToken}` },
    });
  } catch(e) {}
  _authToken = null; _authUser = null;
  sessionStorage.removeItem('sb_token');
  sessionStorage.removeItem('sb_user');
  // Pełne przeładowanie strony — najczystsze rozwiązanie
  window.location.reload();
}

async function sbRefreshToken(refreshToken) {
  const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refreshToken }),
  });
  if (!res.ok) return null;
  const data = await res.json();
  _authToken = data.access_token;
  sessionStorage.setItem('sb_token', _authToken);
  return data.access_token;
}

function sbHeaders() {
  return {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${_authToken || SB_KEY}`,
    'Content-Type': 'application/json',
  };
}
async function sbGet(table, id) {
  const url = id
    ? `${SB_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}&limit=1`
    : `${SB_URL}/rest/v1/${table}?select=*`;
  const res = await fetch(url, { headers: sbHeaders() });
  if (!res.ok) return null;
  const rows = await res.json();
  return id ? (rows[0] || null) : rows;
}

async function sbUpsert(table, row) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify(row),
  });
  return res.ok;
}

async function sbDelete(table, id) {

// Realtime WebSocket
function sbRealtime(table, callback) {
  const ws = new WebSocket(`${SB_URL.replace('https','wss')}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ topic: `realtime:public:${table}`, event: 'phx_join', payload: {}, ref: '1' }));
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.event === 'INSERT' || msg.event === 'UPDATE' || msg.event === 'DELETE') {
      callback(msg.event, msg.payload?.record);
    }
  };
  ws.onclose = () => setTimeout(() => sbRealtime(table, callback), 3000); // auto-reconnect
  return ws;
}

  if (p) {

    if (payload.start) p.start = payload.start;
    if (payload.end)   p.end   = payload.end;
    p.syncId = payload.id; p.hasSchedule = true; p.lastSynced = payload.savedAt;
    await sbUpsert('projekty', { id: p.id, data: p });
    showToast('✓ Zapisano: ' + p.name);
  } else {
    const id = Date.now().toString();
    p = {
      id, syncId: payload.id, num: payload.num || '', name: payload.name || 'Nowy projekt',
      desc: '', status: 'active', start: payload.start || '', end: payload.end || '',
      progress: 0, hasSchedule: true, lastSynced: payload.savedAt
    };
    projects.push(p);
    await sbUpsert('projekty', { id: p.id, data: p });
    showToast('＋ Dodano: ' + p.name);
  }
  renderProjects();
}

// ── Presence ─────────────────────────────────────────────────────────────────
const PRESENCE_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];
function presenceColor(email) {
  let h = 0; for (let i = 0; i < email.length; i++) h = (h * 31 + email.charCodeAt(i)) & 0xffffffff;
  return PRESENCE_COLORS[Math.abs(h) % PRESENCE_COLORS.length];
}
function presenceInitials(email) {
  const name = email.split('@')[0];
  const parts = name.split(/[._-]/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.slice(0, 2).toUpperCase();
}

let _presenceChannel = null;
let _presenceUsers = {};

function startPresence(location) {
  if (!_authUser) return;
  const email = _authUser.email;
  const channel = `presence:${location}`;

  _presenceChannel = new WebSocket(
    `${SB_URL.replace('https','wss')}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`
  );

  _presenceChannel.onopen = () => {
    // Join presence channel
    _presenceChannel.send(JSON.stringify({
      topic: `realtime:${channel}`, event: 'phx_join',
      payload: { config: { presence: { key: email } } }, ref: 'p1'
    }));
    // Broadcast own presence
    _presenceChannel.send(JSON.stringify({
      topic: `realtime:${channel}`, event: 'presence',
      payload: { type: 'track', payload: { email, location, online_at: new Date().toISOString() } },
      ref: 'p2'
    }));
  };

  _presenceChannel.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.event === 'presence_state' || msg.event === 'presence_diff') {
        // Rebuild users list from joins/leaves
        if (msg.payload?.joins) {
          Object.entries(msg.payload.joins).forEach(([key, val]) => {
            const metas = val.metas || [];
            if (metas.length) _presenceUsers[key] = metas[0];
          });
        }
        if (msg.payload?.leaves) {
          Object.keys(msg.payload.leaves).forEach(key => delete _presenceUsers[key]);
        }
        renderPresence();
      }
    } catch(e) {}
  };

  _presenceChannel.onclose = () => setTimeout(() => startPresence(location), 5000);

  // Heartbeat
  setInterval(() => {
    if (_presenceChannel?.readyState === 1) {
      _presenceChannel.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: 'hb' }));
    }
  }, 30000);
}

function renderPresence() {
  const bar = document.getElementById('presence-bar');
  if (!bar) return;
  const myEmail = _authUser?.email;
  const others = Object.entries(_presenceUsers)
    .filter(([email]) => email !== myEmail);

  if (!others.length) { bar.innerHTML = ''; return; }

  bar.innerHTML = others.map(([email]) => `
    <div title="${email}" style="width:26px;height:26px;border-radius:50%;background:${presenceColor(email)};
      display:flex;align-items:center;justify-content:center;font-family:'Barlow',sans-serif;
      font-size:10px;font-weight:700;color:#fff;letter-spacing:.02em;cursor:default;
      border:2px solid rgba(255,255,255,.3)">${presenceInitials(email)}</div>
  `).join('');
}

      method: 'PUT',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${_authToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: p1 }),
    });
    if (!res.ok) throw new Error('Błąd zmiany hasła');
    msg.textContent = 'Hasło zostało zmienione.';
    msg.style.color = '#27ae60';
    msg.style.display = 'block';
    btn.textContent = 'Zapisano ✓';
    setTimeout(() => closeChangePassword(), 2000);
  } catch(e) {
    msg.textContent = e.message;
    msg.style.color = '#c0392b';
    msg.style.display = 'block';
    btn.textContent = 'Zapisz'; btn.disabled = false;
  }
}

// ── Login ─────────────────────────────────────────────────────────────────────
function showLoginScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('user-info').style.display = 'none';
}

function hideLoginScreen() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('user-info').style.display = 'flex';
  document.getElementById('user-email').textContent = _authUser?.email || '';
}

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn      = document.getElementById('login-btn');
  const err      = document.getElementById('login-error');
  if (!email || !password) { err.textContent = 'Wpisz email i hasło'; err.style.display = 'block'; return; }
  btn.textContent = 'Logowanie…'; btn.disabled = true; err.style.display = 'none';
  try {
    await sbSignIn(email, password);
    hideLoginScreen();
    await loadProjects();
    renderProjects();
    startPresence('panel');
    sbRealtime('projekty', async () => { await loadProjects(); renderProjects(); });
    sbRealtime('harmonogramy', async (event, record) => {
      if (!record) return;
      const p = projects.find(x => (x.syncId || x.num) === record.sync_id);
      if (p) { p.hasSchedule = true; renderProjects(); }
    });
  } catch(e) {
    err.textContent = e.message; err.style.display = 'block';
    btn.textContent = 'Zaloguj'; btn.disabled = false;
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  // Sprawdź czy jest zapisany token z poprzedniej sesji
  const saved = sessionStorage.getItem('sb_token');
  const savedUser = sessionStorage.getItem('sb_user');
  if (saved) {
    _authToken = saved;
    try { _authUser = JSON.parse(savedUser); } catch(e) {}
    try {
      await loadProjects();
      hideLoginScreen();
      renderProjects();
      startPresence('panel');
      // Uruchom realtime
      sbRealtime('projekty', async () => { await loadProjects(); renderProjects(); });
      sbRealtime('harmonogramy', async (event, record) => {
        if (!record) return;
        const p = projects.find(x => (x.syncId || x.num) === record.sync_id);
        if (p) { p.hasSchedule = true; renderProjects(); }
      });
    } catch(e) {
      // Token wygasł
      showLoginScreen();
    }
  } else {
    showLoginScreen();
  }
})();
</script>
