<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJEKTY — PANEL GŁÓWNY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#fff;--g1:#f2f2f0;--g2:#e0dfdc;--g3:#c8c7c3;--g4:#9e9d99;--g6:#5a5955;--g8:#2a2a28}
body{font-family:'Barlow',sans-serif;background:var(--g1);color:var(--black);min-height:100vh;display:flex;flex-direction:column}

.site-header{background:var(--black);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:72px;border-bottom:2px solid #222;flex-shrink:0}
.header-left{display:flex;flex-direction:column;gap:2px}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--white);letter-spacing:.04em;text-transform:uppercase}
.header-sub{font-size:11px;color:var(--g4);letter-spacing:.1em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:10px}

.toolbar{padding:16px 32px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar button{font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;padding:4px 14px;cursor:pointer;border:1px solid #d0ccc8;background:#fff;color:#333;box-shadow:0 1px 3px rgba(0,0,0,.10);border-radius:4px;transition:background .12s,box-shadow .12s;letter-spacing:.04em;text-transform:uppercase;height:29px;display:inline-flex;align-items:center;gap:5px}
.toolbar button:hover{background:#f5f3f0;box-shadow:0 2px 6px rgba(0,0,0,.13)}
.toolbar .btn-add{background:var(--black);color:#fff;border-color:var(--black)}
.toolbar .btn-add:hover{background:var(--g8)}
.col-sep{width:1px;height:20px;background:var(--g3)}

.filter-bar{padding:10px 32px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:700;color:var(--g4);letter-spacing:.1em;text-transform:uppercase;margin-right:2px}
.filter-btn{font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;padding:2px 10px;cursor:pointer;border:1px solid var(--g3);background:transparent;color:var(--g6);border-radius:3px;transition:all .12s;letter-spacing:.04em;text-transform:uppercase;height:22px}
.filter-btn:hover,.filter-btn.active{background:var(--black);color:#fff;border-color:var(--black)}

.page{padding:16px 32px 32px;flex:1}

.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:#fff;border:1px solid var(--g2);padding:10px 18px;min-width:120px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--black);line-height:1}
.stat-label{font-size:9px;font-weight:700;color:var(--g4);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}

.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}

.project-card{background:#fff;border:1px solid var(--g2);transition:box-shadow .15s,border-color .15s;position:relative;display:flex;flex-direction:column}
.project-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.10);border-color:var(--g3)}
.project-card.active .card-accent{background:#27ae60}
.project-card.paused .card-accent{background:#e67e22}
.project-card.done .card-accent{background:var(--g4)}
.project-card.planned .card-accent{background:#2980b9}
.card-accent{width:100%;height:3px;flex-shrink:0}
.card-body{padding:16px 18px;flex:1;display:flex;flex-direction:column}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--g4);letter-spacing:.1em;text-transform:uppercase}
.card-status{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:2px}
.status-active{background:#e8f8ee;color:#1a7a40}
.status-paused{background:#fef3e8;color:#b85c00}
.status-done{background:var(--g1);color:var(--g6)}
.status-planned{background:#eef4fb;color:#1a5080}
.card-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--black);line-height:1.2;text-transform:uppercase;letter-spacing:.02em;margin-bottom:6px}
.card-desc{font-size:12px;color:var(--g6);line-height:1.5;margin-bottom:12px;flex:1}
.card-meta{display:flex;align-items:center;gap:12px;border-top:1px solid var(--g1);padding-top:10px}
.meta-item{display:flex;flex-direction:column;gap:1px}
.meta-val{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--g8)}
.meta-key{font-size:9px;font-weight:700;color:var(--g4);letter-spacing:.08em;text-transform:uppercase}
.meta-sep{width:1px;height:28px;background:var(--g2)}
.card-progress{margin-top:10px}
.progress-label{display:flex;justify-content:space-between;margin-bottom:4px}
.progress-text{font-size:9px;font-weight:700;color:var(--g4);letter-spacing:.08em;text-transform:uppercase}
.progress-pct{font-size:9px;font-weight:700;color:var(--g8)}
.progress-track{height:3px;background:var(--g2)}
.progress-fill{height:100%;background:var(--black);transition:width .3s ease}
.project-card.active .progress-fill{background:#27ae60}
.project-card.paused .progress-fill{background:#e67e22}
.card-actions{padding:10px 18px;border-top:1px solid var(--g1);display:flex;gap:6px;background:var(--g1)}
.action-btn{font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;padding:3px 10px;cursor:pointer;border:1px solid #d0ccc8;background:#fff;color:#444;border-radius:3px;transition:all .12s;letter-spacing:.04em;text-transform:uppercase;height:24px;display:inline-flex;align-items:center;gap:4px}
.action-btn:hover{background:#f5f3f0;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.action-btn.primary{background:var(--black);color:#fff;border-color:var(--black)}
.action-btn.primary:hover{background:var(--g8)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border:2px solid var(--black);padding:28px;width:420px;max-width:95vw;box-shadow:6px 6px 0 var(--black)}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{font-size:10px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;font-size:13px;font-family:'Barlow',sans-serif;border:1.5px solid var(--g3);background:#fff;color:var(--black);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--black)}
.field textarea{min-height:60px;resize:vertical;line-height:1.5}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--g2)}
.modal-actions button{font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:6px 18px;cursor:pointer;border:1.5px solid var(--black);letter-spacing:.04em;text-transform:uppercase;height:32px;display:inline-flex;align-items:center}
.modal-actions .btn-save{background:var(--black);color:#fff}
.modal-actions .btn-save:hover{background:var(--g8)}
.modal-actions .btn-cancel{background:#fff;color:var(--black)}
.modal-actions .btn-cancel:hover{background:var(--g1)}
.btn-del{margin-right:auto;background:#fff;color:#c0392b;border-color:#c0392b}
.btn-del:hover{background:#c0392b;color:#fff}

.empty-state{padding:64px 32px;text-align:center;grid-column:1/-1}
.empty-state .es-icon{font-size:40px;margin-bottom:16px}
.empty-state .es-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--g3);margin-bottom:8px}
.empty-state .es-sub{font-size:12px;color:var(--g4)}

.search-wrap{position:relative;flex:1;max-width:280px}
.search-wrap input{width:100%;padding:5px 10px 5px 30px;font-size:12px;font-family:'Barlow',sans-serif;border:1px solid var(--g3);background:#fff;color:var(--black);outline:none;height:29px}
.search-wrap input:focus{border-color:var(--black)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--g4);font-size:12px;pointer-events:none}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <div class="header-title">Panel projektów</div>
    <div class="header-sub">Zarządzanie harmonogramami</div>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Szukaj projektu…" id="search-input" oninput="filterProjects()">
    </div>
  </div>
</header>

<div class="toolbar">
  <button class="btn-add" id="btn-new">＋ Nowy projekt</button>
  <div class="col-sep"></div>
  <button id="view-grid" onclick="setView('grid')">⊞ Kafelki</button>
  <button id="view-list" onclick="setView('list')">☰ Lista</button>
</div>

<div class="filter-bar">
  <span class="filter-label">Status:</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">Wszystkie</button>
  <button class="filter-btn" onclick="setFilter('active',this)">Aktywne</button>
  <button class="filter-btn" onclick="setFilter('planned',this)">Planowane</button>
  <button class="filter-btn" onclick="setFilter('paused',this)">Wstrzymane</button>
  <button class="filter-btn" onclick="setFilter('done',this)">Zakończone</button>
</div>

<div class="page">
  <div class="stats-row" id="stats-row"></div>
  <div class="projects-grid" id="projects-container"></div>
</div>

<!-- EDIT MODAL (tylko do edycji metadanych) -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">Edytuj projekt</h3>
    <div class="field-row">
      <div class="field">
        <label>Numer projektu</label>
        <input type="text" id="f-num" placeholder="np. 2026/001">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f-status">
          <option value="planned">Planowany</option>
          <option value="active">Aktywny</option>
          <option value="paused">Wstrzymany</option>
          <option value="done">Zakończony</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Nazwa projektu</label>
      <input type="text" id="f-name" placeholder="np. Remont biura">
    </div>
    <div class="field">
      <label>Opis</label>
      <textarea id="f-desc" placeholder="Krótki opis…"></textarea>
    </div>
    <div class="field-row">
      <div class="field"><label>Start</label><input type="date" id="f-start"></div>
      <div class="field"><label>Koniec</label><input type="date" id="f-end"></div>
    </div>
    <div class="field">
      <label>Postęp (%)</label>
      <input type="number" id="f-progress" min="0" max="100" value="0">
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="btn-delete" onclick="deleteProject()">🗑 Usuń</button>
      <button class="btn-cancel" onclick="closeModal()">Anuluj</button>
      <button class="btn-save" onclick="saveProject()">Zapisz</button>
    </div>
  </div>
</div>

<script>
// ── Stan ─────────────────────────────────────────────────────────────────────
let projects = [];
let editId = null;
let currentFilter = 'all';
let currentSearch = '';
let templateHTML = null; // cache szablonu

function loadProjects() {
  try { projects = JSON.parse(localStorage.getItem('pm_projects') || '[]'); } catch(e) { projects = []; }
}
function saveProjects() {
  // Zapisujemy TYLKO metadane — nigdy scheduleData w głównej liście
  const slim = projects.map(p => {
    const {scheduleData, ...meta} = p;
    return meta;
  });
  localStorage.setItem('pm_projects', JSON.stringify(slim));
}

// Harmonogram trzymany osobno per projekt (klucz: pm_sched_{id})
function saveSchedule(id, html) {
  try { localStorage.setItem('pm_sched_' + id, html); return true; }
  catch(e) {
    // localStorage pełny — wyczyść najstarsze
    for (const k of Object.keys(localStorage)) {
      if (k.startsWith('pm_sched_') && k !== 'pm_sched_' + id) { localStorage.removeItem(k); break; }
    }
    try { localStorage.setItem('pm_sched_' + id, html); return true; } catch(e2) { return false; }
  }
}
function loadSchedule(id) {
  return localStorage.getItem('pm_sched_' + id);
}

loadProjects();

// Projekty domyślne przy pierwszym uruchomieniu
if (projects.length === 0) {
  projects = [{
    id: '1',
    syncId: 'MCD',
    num: '4273001-012',
    name: 'MCD',
    desc: '',
    status: 'active',
    start: '',
    end: '',
    progress: 0,
    hasSchedule: true,
    scheduleUrl: '4273001-012-MCD_03_06_2026.html'
  }];
  saveProjects();
}

// ── Szablon ──────────────────────────────────────────────────────────────────
function getTemplate() {
  if (templateHTML) return templateHTML;
  try { templateHTML = localStorage.getItem('pm_template'); } catch(e) {}
  return templateHTML;
}

function saveTemplate(html) {
  templateHTML = html;
  try { localStorage.setItem('pm_template', html); } catch(e) {}
}

// URL szablonu — ten sam folder co panel
function templateURL() {
  const base = window.location.href.replace(/\/[^/]*$/, '/');
  return base + 'HARMONOGRAM_2026.html';
}

async function fetchTemplate() {
  const res = await fetch(templateURL());
  if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
  return res.text();
}

function makeBlankSchedule(src, projectName, projectNum) {
  const startMarker = '// __STATE_START__';
  const endMarker   = '// __STATE_END__';
  const si = src.indexOf(startMarker);
  const ei = src.indexOf(endMarker);
  if (si < 0 || ei < 0) return src;
  const blank = `// __STATE_START__
let view='month';
let viewStart=new Date();
let cols=null;
let calAlerts=[];
let ustalenia=[];
let tasks=[];
let cbExpanded={};
let expanded={};
let editId=null,editParentId=null,nextId=1;
let phaseSummaryConfig=[];
let _psExpanded=false;
// __STATE_END__`;
  let result = src.slice(0, si) + blank + src.slice(ei + endMarker.length);
  if (projectName || projectNum) {
    const inject = `\n<script>document.addEventListener('DOMContentLoaded',function(){
      var t=document.getElementById('project-title');
      var n=document.getElementById('project-number');
      if(t&&!t.value)t.value=${JSON.stringify(projectName||'')};
      if(n&&!n.value)n.value=${JSON.stringify(projectNum||'')};
      if(t)document.title=t.value||'Harmonogram';
    });<\/script>`;
    result = result.replace('</body>', inject + '\n</body>');
  }
  return result;
}

async function openNewFromTemplate(projectName, projectNum) {
  let src = getTemplate();
  if (!src) {
    try {
      src = await fetchTemplate();
      saveTemplate(src);
    } catch(e) {
      // Fallback file://  — poproś o plik ręcznie
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.html';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          saveTemplate(ev.target.result);
          openNewFromTemplate(projectName, projectNum);
        };
        reader.readAsText(file);
      };
      input.click();
      showToast('Wybierz plik HARMONOGRAM_2026.html jako szablon');
      return;
    }
  }
  const blank = makeBlankSchedule(src, projectName, projectNum);
  openInTab(blank);
}

document.getElementById('btn-new').addEventListener('click', () => {
  openNewFromTemplate('', '');
});

function openInTab(html) {
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  window.open(url, '_blank');
  setTimeout(() => URL.revokeObjectURL(url), 120000);
}

// ── Render ───────────────────────────────────────────────────────────────────
function statusLabel(s) {
  return {active:'Aktywny',planned:'Planowany',paused:'Wstrzymany',done:'Zakończony'}[s] || s;
}

function renderStats() {
  const t = projects.length;
  const a = projects.filter(p=>p.status==='active').length;
  const d = projects.filter(p=>p.status==='done').length;
  const pl= projects.filter(p=>p.status==='planned').length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-val">${t}</div><div class="stat-label">Wszystkie</div></div>
    <div class="stat-card"><div class="stat-val">${a}</div><div class="stat-label">Aktywne</div></div>
    <div class="stat-card"><div class="stat-val">${pl}</div><div class="stat-label">Planowane</div></div>
    <div class="stat-card"><div class="stat-val">${d}</div><div class="stat-label">Zakończone</div></div>`;
}

function getFiltered() {
  return projects.filter(p => {
    const okFilter = currentFilter === 'all' || p.status === currentFilter;
    const q = currentSearch.toLowerCase();
    const okSearch = !q || p.name.toLowerCase().includes(q) || (p.num||'').toLowerCase().includes(q) || (p.desc||'').toLowerCase().includes(q);
    return okFilter && okSearch;
  });
}

function renderProjects() {
  renderStats();
  const container = document.getElementById('projects-container');
  const list = getFiltered();
  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div><div class="es-title">Brak projektów</div><div class="es-sub">Kliknij + Nowy projekt lub zmień filtry</div></div>`;
    return;
  }
  container.innerHTML = list.map(p => `
    <div class="project-card ${p.status}">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-num">${p.num || '—'}</div>
          <div class="card-status status-${p.status}">${statusLabel(p.status)}</div>
        </div>
        <div class="card-name">${p.name}</div>
        ${p.desc ? `<div class="card-desc">${p.desc}</div>` : ''}
        <div class="card-meta">
          ${p.start ? `<div class="meta-item"><div class="meta-val">${p.start.slice(0,7)}</div><div class="meta-key">Start</div></div>` : ''}
          ${p.end   ? `<div class="meta-sep"></div><div class="meta-item"><div class="meta-val">${p.end.slice(0,7)}</div><div class="meta-key">Koniec</div></div>` : ''}
          ${p.hasSchedule ? `<div class="meta-sep"></div><div class="meta-item"><div class="meta-val" style="color:#27ae60">✓</div><div class="meta-key">Harmonogram</div></div>` : ''}
        </div>
        <div class="card-progress">
          <div class="progress-label"><span class="progress-text">Postęp</span><span class="progress-pct">${p.progress||0}%</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${p.progress||0}%"></div></div>
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn primary" onclick="openSchedule('${p.id}')">📅 Harmonogram</button>
        <button class="action-btn" onclick="editProject('${p.id}')">✎ Edytuj</button>
      </div>
    </div>`).join('');
}

// ── Otwieranie harmonogramu ──────────────────────────────────────────────────
function openSchedule(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;

  const syncId = p.syncId || p.num || p.name.replace(/\s+/g,'_');

  // Zapisany harmonogram
  const stored = localStorage.getItem('pm_sched_src_' + syncId);
  if (stored) { openInTab(stored); return; }

  // Fallback: zewnętrzny URL (demo projekt)
  if (p.scheduleUrl) { window.open(p.scheduleUrl, '_blank'); return; }

  // Brak harmonogramu — otwórz pusty szablon powiązany z tym projektem
  openNewFromTemplate(p.name, p.num || syncId);
}

// ── Filtry / wyszukiwanie ────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderProjects();
}
function filterProjects() {
  currentSearch = document.getElementById('search-input').value;
  renderProjects();
}
function setView(v) {
  document.getElementById('projects-container').style.gridTemplateColumns = v === 'list' ? '1fr' : '';
}

// ── Modal edycji metadanych ──────────────────────────────────────────────────
function editProject(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  editId = id;
  document.getElementById('f-num').value      = p.num    || '';
  document.getElementById('f-name').value     = p.name   || '';
  document.getElementById('f-desc').value     = p.desc   || '';
  document.getElementById('f-status').value   = p.status || 'planned';
  document.getElementById('f-start').value    = p.start  || '';
  document.getElementById('f-end').value      = p.end    || '';
  document.getElementById('f-progress').value = p.progress || 0;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}
function saveProject() {
  const p = projects.find(x => x.id === editId);
  if (!p) return;
  p.num      = document.getElementById('f-num').value.trim();
  p.name     = document.getElementById('f-name').value.trim() || p.name;
  p.desc     = document.getElementById('f-desc').value.trim();
  p.status   = document.getElementById('f-status').value;
  p.start    = document.getElementById('f-start').value;
  p.end      = document.getElementById('f-end').value;
  p.progress = parseInt(document.getElementById('f-progress').value) || 0;
  saveProjects();
  closeModal();
  renderProjects();
}
function deleteProject() {
  if (!confirm('Usunąć projekt?')) return;
  localStorage.removeItem('pm_sched_' + editId);
  projects = projects.filter(x => x.id !== editId);
  saveProjects();
  closeModal();
  renderProjects();
}

// ── Synchronizacja z harmonogramem ──────────────────────────────────────────
function applySync(payload) {
  if (!payload || !payload.id) return;
  let p = projects.find(x => x.syncId === payload.id || (x.num && x.num === payload.num && payload.num));
  if (p) {
    p.name  = payload.name || p.name;
    p.num   = payload.num  || p.num;
    if (payload.start) p.start = payload.start;
    if (payload.end)   p.end   = payload.end;
    p.syncId      = payload.id;
    p.hasSchedule = true;
    p.lastSynced  = payload.savedAt;
    showToast('✓ Zapisano: ' + p.name);
  } else {
    const id = Date.now().toString();
    p = {
      id, syncId: payload.id,
      num: payload.num || '', name: payload.name || 'Nowy projekt',
      desc: '',
      status: 'active', start: payload.start || '', end: payload.end || '',
      progress: 0, hasSchedule: true, lastSynced: payload.savedAt
    };
    projects.push(p);
    showToast('＋ Dodano projekt: ' + p.name);
  }
  saveProjects();
  renderProjects();
}

try {
  const bc = new BroadcastChannel('pm_sync');
  bc.onmessage = e => applySync(e.data);
} catch(e) {}

function checkSyncQueue() {
  try {
    const queue = JSON.parse(localStorage.getItem('pm_sync_queue') || '[]');
    queue.forEach(payload => {
      const existing = projects.find(x => x.syncId === payload.id || (x.num && x.num === payload.num));
      if (existing && existing.lastSynced === payload.savedAt) return;
      applySync(payload);
    });
  } catch(e) {}
}
checkSyncQueue();
setInterval(checkSyncQueue, 5000);

function showToast(msg) {
  let t = document.getElementById('pm-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'pm-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0a0a0a;color:#fff;font-family:Barlow,sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:10px 20px;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:999;transition:opacity .3s;opacity:0;pointer-events:none;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._hide);
  t._hide = setTimeout(() => { t.style.opacity = '0'; }, 3500);
}

renderProjects();
</script>
